<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONVOY — Production Breakdown</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF0066;
    --pink-dim: rgba(255,0,102,0.15);
    --pink-glow: rgba(255,0,102,0.4);
    --bg: #0a0a0a;
    --bg-card: #111111;
    --bg-card2: #181818;
    --border: rgba(255,255,255,0.08);
    --border-pink: rgba(255,0,102,0.3);
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #555;
    --font: 'Barlow Condensed', sans-serif;
    --fontb: 'Barlow', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── PASSWORD SCREEN ─── */
  #lock-screen {
    position: fixed; inset:0; z-index:1000;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 32px;
  }
  .lock-logo {
    font-size: 72px; font-weight: 900; letter-spacing: -2px;
    color: var(--text);
    line-height: 1;
  }
  .lock-logo span { color: var(--pink); }
  .lock-sub {
    font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text-dim); font-family: var(--fontb); font-weight: 400;
  }
  .lock-form { display:flex; flex-direction:column; gap:12px; width:280px; }
  .lock-form input {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: 18px;
    letter-spacing: 6px; padding: 14px 18px; text-align:center;
    outline: none; transition: border-color .2s;
  }
  .lock-form input:focus { border-color: var(--pink); }
  .lock-form input::placeholder { letter-spacing: 2px; color: var(--text-muted); font-size:14px; }
  .lock-btn {
    background: var(--pink); color: #fff; border:none;
    font-family: var(--font); font-size: 16px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; padding: 14px;
    cursor: pointer; transition: opacity .2s;
  }
  .lock-btn:hover { opacity: .85; }
  .lock-err { font-size:13px; color:var(--pink); text-align:center; font-family:var(--fontb); min-height:18px; }
  .lock-divider {
    width: 280px; height: 1px; background: var(--border);
    position: relative; margin: 8px 0;
  }

  /* ─── MAIN APP ─── */
  #app { display:none; }

  /* TOP BAR */
  .topbar {
    position: sticky; top:0; z-index:100;
    background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 56px;
  }
  .topbar-logo {
    font-size: 28px; font-weight: 900; letter-spacing: -1px;
    color: var(--text);
  }
  .topbar-logo span { color: var(--pink); }
  .topbar-meta {
    font-size: 12px; letter-spacing: 3px; color: var(--text-dim);
    text-transform: uppercase; font-family: var(--fontb);
  }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .topbar-export {
    background: transparent; border: 1px solid var(--pink);
    color: var(--pink); font-family: var(--font); font-size: 13px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 7px 16px; cursor: pointer; transition: all .2s;
  }
  .topbar-export:hover { background: var(--pink); color: #fff; }

  /* CHAPTER FILTER */
  .chapter-bar {
    padding: 20px 32px 0;
    display: flex; align-items: center; gap: 8px; flex-wrap:wrap;
  }
  .chapter-label {
    font-size: 11px; letter-spacing: 3px; text-transform:uppercase;
    color: var(--text-muted); font-family: var(--fontb); margin-right:4px;
  }
  .chapter-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--font); font-size: 13px;
    font-weight: 600; letter-spacing: 1px; padding: 5px 14px;
    cursor: pointer; transition: all .15s; text-transform: uppercase;
  }
  .chapter-btn:hover { border-color: var(--pink); color: var(--pink); }
  .chapter-btn.active {
    background: var(--pink); border-color: var(--pink);
    color: #fff;
  }

  /* SYNOPSIS BOX */
  .synopsis-box {
    margin: 16px 32px 0;
    padding: 16px 20px;
    background: var(--bg-card);
    border-left: 3px solid var(--pink);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .synopsis-box.visible { display: block; }
  .synopsis-ep {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--pink); font-family: var(--fontb); margin-bottom: 6px;
  }
  .synopsis-title {
    font-size: 20px; font-weight: 800; text-transform: uppercase;
    color: var(--text); margin-bottom: 8px; font-family: var(--font);
  }
  .synopsis-text {
    font-size: 13px; color: var(--text-dim); font-family: var(--fontb);
    line-height: 1.6;
  }
  .synopsis-lang-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); font-family: var(--font); font-size: 12px;
    font-weight: 700; letter-spacing: 2px; padding: 4px 10px;
    cursor: pointer; transition: all .15s; flex-shrink: 0; margin-top: 2px;
  }
  .synopsis-lang-btn:hover { border-color: var(--pink); color: var(--pink); }
  .synopsis-lang-btn.active { background: var(--pink); border-color: var(--pink); color: #fff; }

  /* TAB NAV */
  .tab-nav {
    padding: 24px 32px 0;
    display: flex; align-items: flex-end; gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--text-muted); font-family: var(--font); font-size: 16px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 24px 12px; cursor: pointer; transition: all .15s;
    position: relative; bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--pink); border-bottom-color: var(--pink);
  }
  .tab-count {
    display:inline-block; background: var(--bg-card2);
    border: 1px solid var(--border); color: var(--text-dim);
    font-size: 11px; padding: 1px 6px; margin-left:6px;
    font-weight: 600; vertical-align: middle;
  }
  .tab-btn.active .tab-count { background: var(--pink-dim); border-color: var(--border-pink); color: var(--pink); }

  /* SECTION CONTENT */
  .section-content { padding: 28px 32px 48px; }

  /* STATS ROW */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 16px 20px;
  }
  .stat-label {
    font-size: 10px; letter-spacing: 3px; text-transform:uppercase;
    color: var(--text-muted); font-family: var(--fontb); margin-bottom:6px;
  }
  .stat-num {
    font-size: 36px; font-weight: 900; color: var(--text); line-height:1;
  }
  .stat-num.pink { color: var(--pink); }

  /* GRID LAYOUT */
  .cards-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* CHARACTER / ASSET CARD */
  .item-card {
    background: var(--bg-card); border: 1px solid var(--border);
    transition: border-color .2s; overflow: hidden;
  }
  .item-card:hover { border-color: var(--border-pink); }

  .card-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 8px;
  }
  .card-name {
    font-size: 20px; font-weight: 800; letter-spacing: .5px;
    color: var(--text); text-transform: uppercase; line-height:1.1;
  }
  .card-role {
    font-size: 12px; color: var(--text-muted); margin-top:3px;
    font-family: var(--fontb); text-transform: uppercase; letter-spacing:2px;
  }
  .card-vehicle {
    font-size: 13px; color: var(--pink); margin-top:5px;
    font-family: var(--fontb); font-weight: 500; letter-spacing:.3px;
    cursor: pointer; display: inline-block;
  }
  .card-vehicle:hover { text-decoration: underline; opacity: .8; }
  .card-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; padding: 3px 8px;
    white-space: nowrap; flex-shrink:0;
  }
  .badge-character { background: var(--pink-dim); color: var(--pink); border: 1px solid var(--border-pink); }
  .badge-vehicle { background: rgba(0,180,255,0.1); color: #00b4ff; border: 1px solid rgba(0,180,255,0.25); }
  .badge-env { background: rgba(0,220,120,0.1); color: #00dc78; border: 1px solid rgba(0,220,120,0.25); }
  .badge-villain { background: rgba(255,80,0,0.1); color: #ff5000; border: 1px solid rgba(255,80,0,0.25); }

  /* IMAGE DROP ZONE */
  .drop-zone {
    width: 100%; height: 140px;
    background: var(--bg-card2); border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px; cursor: pointer;
    transition: all .2s; position: relative; overflow: hidden;
  }
  .drop-zone:hover { border-color: var(--pink); background: rgba(255,0,102,0.04); }
  .drop-zone.drag-over { border-color: var(--pink); background: var(--pink-dim); }
  .drop-zone.has-image { border-style: solid; border-color: var(--border); }
  .drop-zone img {
    position: absolute; inset:0; width:100%; height:100%;
    object-fit: contain; opacity:1; padding: 8px;
  }
  .drop-zone-label {
    font-size: 11px; color: var(--text-muted); letter-spacing:2px;
    text-transform: uppercase; font-family: var(--fontb); text-align:center;
    position: relative; z-index:1; pointer-events: none;
  }
  .drop-zone-icon {
    width: 24px; height: 24px; position: relative; z-index:1;
    opacity: .4;
  }
  .drop-zone:hover .drop-zone-label, .drop-zone:hover .drop-zone-icon { opacity:.9; }
  .drop-zone.has-image .drop-zone-label { background: rgba(0,0,0,0.6); padding:3px 8px; }
  .drop-zone input[type=file] { display:none; }
  input[type=file] { display:none; }

  /* CARD BODY */
  .card-body { padding: 14px 18px; }
  .card-appearances {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .ep-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    background: var(--bg-card2); border: 1px solid var(--border);
    color: var(--text-muted); padding: 2px 7px; text-transform: uppercase;
  }
  .ep-tag.present { border-color: var(--border-pink); color: var(--pink); background: var(--pink-dim); }

  .card-detail {
    font-size: 13px; color: var(--text-dim); font-family: var(--fontb);
    line-height: 1.5; margin-bottom: 10px;
  }
  .card-sku {
    font-size: 11px; color: var(--text-muted); font-family: var(--fontb);
    letter-spacing: 1px; font-weight: 500;
  }
  .card-actions {
    display: flex; gap: 8px; padding: 12px 18px;
    border-top: 1px solid var(--border);
  }
  .card-action-btn {
    flex:1; background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); font-family: var(--font); font-size: 12px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 7px; cursor: pointer; transition: all .15s;
  }
  .card-action-btn:hover { border-color: var(--pink); color: var(--pink); }
  .card-action-btn.primary { background: var(--pink); border-color: var(--pink); color:#fff; }
  .card-action-btn.primary:hover { opacity:.85; }

  /* UPLOAD STATUS */
  .upload-status {
    font-size: 11px; text-align:center; padding: 4px 18px 8px;
    font-family: var(--fontb); min-height: 22px;
    color: var(--text-muted);
  }
  .upload-status.ok { color: #00dc78; }
  .upload-status.err { color: var(--pink); }

  /* ENV CARD - wider */
  .env-card { background: var(--bg-card); border: 1px solid var(--border); }
  .env-header {
    padding: 16px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .env-name { font-size: 20px; font-weight: 800; text-transform: uppercase; }
  .env-drop {
    width: 100%; height: 180px;
    background: var(--bg-card2); border-bottom: 1px solid var(--border);
    display: flex; align-items:center; justify-content:center;
    flex-direction:column; gap:6px; cursor:pointer; transition: all .2s;
    position: relative; overflow:hidden;
  }
  .env-drop:hover { background: rgba(255,0,102,0.04); }
  .env-drop img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.65; }
  .env-drop input[type=file] { display:none; }
  .env-body { padding: 14px 18px; }
  .env-eps {
    display: flex; flex-wrap:wrap; gap:5px; margin-bottom: 10px;
  }
  .env-detail { font-size:13px; color:var(--text-dim); font-family:var(--fontb); line-height:1.5; }

  /* CAROUSEL */
  .carousel-wrap {
    position: relative; width: 100%; background: var(--bg-card2);
    border-bottom: 1px solid var(--border);
  }
  .carousel-wrap.drag-over { outline: 2px dashed var(--pink); }
  .carousel-track-outer {
    overflow-x: auto; overflow-y: hidden; width: 100%;
    scrollbar-width: none;
  }
  .carousel-track-outer::-webkit-scrollbar { display: none; }
  .carousel-track {
    display: flex; gap: 4px; padding: 4px;
  }
  .carousel-thumb {
    flex: 0 0 80px; height: 72px; cursor: pointer;
    position: relative; overflow: hidden; border: 1px solid var(--border);
    transition: border-color .2s;
  }
  .carousel-thumb:hover { border-color: var(--pink); }
  .carousel-thumb img {
    width: 100%; height: 100%; object-fit: contain;
    background: var(--bg-card2); padding: 2px;
  }
  .carousel-thumb .thumb-del {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,.7); color: var(--pink);
    border: none; font-size: 11px; width: 16px; height: 16px;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    line-height: 1;
  }
  .carousel-thumb:hover .thumb-del { display: flex; }
  .carousel-add {
    flex: 0 0 72px; height: 72px; border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); font-size: 22px;
    transition: all .2s; background: transparent;
  }
  .carousel-add:hover { border-color: var(--pink); color: var(--pink); }
  .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,.8); border: 1px solid var(--border);
    color: var(--text); width: 24px; height: 40px;
    cursor: pointer; z-index: 10; display: flex;
    align-items: center; justify-content: center;
    font-size: 14px; transition: all .2s; padding: 0;
  }
  .carousel-btn:hover { background: var(--pink); border-color: var(--pink); }
  .carousel-btn.prev { left: 0; }
  .carousel-btn.next { right: 0; }
  .carousel-btn.hidden { display: none; }
  .carousel-empty {
    height: 80px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; font-family: var(--fontb); cursor: pointer;
    flex-direction: column; gap: 6px;
  }
  .carousel-empty:hover { color: var(--pink); }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(0,0,0,.92); display: none;
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 90vh; object-fit: contain;
  }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px;
    background: transparent; border: none; color: #fff;
    font-size: 32px; cursor: pointer; line-height: 1;
  }
  .lightbox-close:hover { color: var(--pink); }
  .lightbox-prev, .lightbox-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    color: #fff; font-size: 24px; width: 48px; height: 48px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .lightbox-prev:hover, .lightbox-next:hover { background: var(--pink); border-color: var(--pink); }
  .lightbox-prev { left: 24px; }
  .lightbox-next { right: 24px; }
  .lightbox-counter {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.6); font-family: var(--fontb); font-size: 13px;
  }

  /* NOTES TEXTAREA */
  .notes-area {
    width:100%; background: var(--bg-card2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--fontb); font-size: 13px;
    padding: 10px 14px; resize: vertical; min-height: 60px; outline:none;
    transition: border-color .2s; margin-top:10px;
  }
  .notes-area:focus { border-color: var(--pink); }

  /* NOTIFICATION TOAST */
  #toast {
    position: fixed; bottom: 28px; right: 28px; z-index:9999;
    background: var(--bg-card); border: 1px solid var(--border);
    border-left: 3px solid var(--pink);
    padding: 14px 20px; font-family: var(--fontb); font-size: 13px;
    color: var(--text); max-width: 320px; opacity:0;
    transform: translateY(12px); transition: all .3s;
    pointer-events: none;
  }
  #toast.show { opacity:1; transform:translateY(0); }

  /* SEARCH */
  .search-bar {
    display:flex; gap:10px; align-items:center; margin-bottom: 20px;
  }
  .search-input {
    flex:1; background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); font-family: var(--fontb); font-size: 14px;
    padding: 9px 16px; outline:none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--pink); }
  .search-input::placeholder { color: var(--text-muted); }

  /* PROGRESS BAR */
  .progress-row { display:flex; align-items:center; gap:10px; margin-bottom: 20px; }
  .progress-bar-wrap {
    flex:1; height:3px; background: var(--border);
  }
  .progress-bar-fill {
    height:100%; background: var(--pink); transition: width .5s;
  }
  .progress-label { font-size:12px; color:var(--text-muted); font-family:var(--fontb); white-space:nowrap; }

  /* SECTION DIVIDER */
  .section-title {
    font-size: 11px; letter-spacing:4px; text-transform:uppercase;
    color: var(--text-muted); font-family: var(--fontb);
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
    margin-bottom: 16px; margin-top: 28px;
  }
  .section-title:first-child { margin-top:0; }

  /* PIPELINE CONFIG MODAL */
  .modal-overlay {
    position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.75);
    display:none; align-items:center; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background: var(--bg-card); border: 1px solid var(--border);
    width: 520px; max-width: 95vw; max-height: 85vh; overflow-y:auto;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { font-size:22px; font-weight:800; letter-spacing:1px; text-transform:uppercase; }
  .modal-close {
    background:transparent; border:none; color:var(--text-muted);
    font-size:24px; cursor:pointer; line-height:1; padding:4px;
  }
  .modal-close:hover { color:var(--pink); }
  .modal-body { padding: 24px; display:flex; flex-direction:column; gap:18px; }
  .modal-field label {
    display:block; font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:var(--text-muted); font-family:var(--fontb); margin-bottom:7px;
  }
  .modal-field input, .modal-field select {
    width:100%; background:var(--bg-card2); border:1px solid var(--border);
    color:var(--text); font-family:var(--fontb); font-size:14px;
    padding:10px 14px; outline:none; transition:border-color .2s;
  }
  .modal-field input:focus, .modal-field select:focus { border-color:var(--pink); }
  .modal-field select { cursor:pointer; }
  .modal-field select option { background:var(--bg-card); }
  .modal-save {
    width:100%; background:var(--pink); color:#fff; border:none;
    font-family:var(--font); font-size:16px; font-weight:800;
    letter-spacing:3px; text-transform:uppercase; padding:14px;
    cursor:pointer; transition:opacity .2s;
  }
  .modal-save:hover { opacity:.85; }
  .pipeline-status {
    display:flex; gap:8px; align-items:center;
    padding: 12px 14px; background: var(--bg-card2); border:1px solid var(--border);
  }
  .pipe-dot {
    width:8px; height:8px; border-radius:50%; background:var(--text-muted);
  }
  .pipe-dot.ok { background:#00dc78; }
  .pipe-dot.err { background:var(--pink); }
  .pipe-text { font-size:12px; color:var(--text-dim); font-family:var(--fontb); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

// AUTH
// ════════════════════════════════════════
const PASS = 'Matchbox';
function checkPwd() {
  const v = document.getElementById('pwd-input').value;
  if(v === PASS) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pwd-err').textContent = 'Contraseña incorrecta.';
    document.getElementById('pwd-input').value = '';
    setTimeout(()=> document.getElementById('pwd-err').textContent='', 2000);
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkPwd();
});

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
function init() {
  loadLocal();
  loadPipelineConfig();
  updateTabCounts();
  renderActive();
  updateStats();
  // Load from JSONBin — slight delay to ensure DOM is ready
  setTimeout(loadJSONBin, 300);
}

function loadLocal() {
  try {
    const img = localStorage.getItem('convoy_images');
    if(img) {
      const parsed = JSON.parse(img);
      Object.entries(parsed).forEach(([k,v]) => {
        if(v.images) {
          imageData[k] = { images: v.images.map(i => ({ cloudinaryUrl: i.cloudinaryUrl||'', url: i.cloudinaryUrl||'' })) };
        }
      });
    }
    const nts = localStorage.getItem('convoy_notes');
    if(nts) notesData = JSON.parse(nts);
    const pipe = localStorage.getItem('convoy_pipeline');
    if(pipe) pipeline = JSON.parse(pipe);
  } catch(e) {}
}

function saveLocal() {
  // Strip base64 — only keep cloudinary URLs
  const lightImages = {};
  Object.entries(imageData).forEach(([k,v]) => {
    if(v.images) {
      lightImages[k] = { images: v.images.map(img => ({ cloudinaryUrl: img.cloudinaryUrl||'', url: img.cloudinaryUrl||'' })) };
    }
  });
  localStorage.setItem('convoy_images', JSON.stringify(lightImages));
  localStorage.setItem('convoy_notes', JSON.stringify(notesData));
}

// ════════════════════════════════════════
// FILTERS & TABS
// ════════════════════════════════════════
function filterChapter(ch, btn) {
  currentChapter = ch;
  document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateTabCounts();
  renderActive();
  updateStats();
  // Show/hide synopsis
  const box = document.getElementById('synopsis-box');
  if(ch === 'all') {
    box.classList.remove('visible');
  } else {
    renderSynopsis(ch);
    box.classList.add('visible');
  }
}

function renderSynopsis(ch) {
  const ep = ch || currentChapter;
  const s = EP_SYNOPSES[ep];
  if(!s) return;
  document.getElementById('synopsis-ep').textContent = s.label;
  document.getElementById('synopsis-title').textContent = s.title;
  document.getElementById('synopsis-text').textContent = synopsisLang === 'en' ? s.en : s.es;
  const btn = document.getElementById('synopsis-lang-btn');
  if(btn) {
    btn.textContent = synopsisLang === 'en' ? 'ES' : 'EN';
    btn.classList.toggle('active', synopsisLang === 'es');
  }
}

function toggleSynopsisLang() {
  synopsisLang = synopsisLang === 'en' ? 'es' : 'en';
  renderSynopsis(currentChapter);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  renderActive();
}

function filterByChapter(arr) {
  if(currentChapter === 'all') return arr;
  return arr.filter(item => item.episodes.includes(currentChapter));
}

function filterBySearch(arr) {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if(!q) return arr;
  return arr.filter(item =>
    item.name.toLowerCase().includes(q) ||
    item.detail.toLowerCase().includes(q) ||
    (item.sku && item.sku.toLowerCase().includes(q)) ||
    (item.role && item.role.toLowerCase().includes(q))
  );
}

function getFiltered(arr) {
  return filterBySearch(filterByChapter(arr));
}

function updateTabCounts() {
  document.getElementById('tc-chars').textContent = getFiltered(CHARACTERS).length;
  document.getElementById('tc-vehicles').textContent = getFiltered(VEHICLES).length;
  document.getElementById('tc-envs').textContent = getFiltered(ENVIRONMENTS).length;
}

function renderActive() {
  updateTabCounts();
  if(currentTab === 'characters') renderCharacters();
  if(currentTab === 'vehicles') renderVehicles();
  if(currentTab === 'environments') renderEnvironments();
  updateStats();
}

// ════════════════════════════════════════
// STATS & PROGRESS
// ════════════════════════════════════════
function updateStats() {
  const all = [...getFiltered(CHARACTERS), ...getFiltered(VEHICLES), ...getFiltered(ENVIRONMENTS)];
  const total = all.length;
  const imaged = all.filter(a => getImages(a.id).length > 0).length;
  const pending = total - imaged;
  const elTotal = document.getElementById('stat-total');
  if(elTotal) elTotal.textContent = total;
  const pct = total > 0 ? Math.round((imaged/total)*100) : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-label').textContent = pct+'% completado';
}

function renderCharacters() {
  const grid = document.getElementById('chars-grid');
  const items = getFiltered(CHARACTERS);
  if(!items.length) { grid.innerHTML = '<div style="color:var(--text-muted);font-family:var(--fontb);padding:20px;">Sin resultados.</div>'; return; }
  grid.innerHTML = items.map(c => buildItemCard(c)).join('');
  attachCardEvents(items);
}

function renderVehicles() {
  const grid = document.getElementById('vehicles-grid');
  const items = getFiltered(VEHICLES);
  if(!items.length) { grid.innerHTML = '<div style="color:var(--text-muted);font-family:var(--fontb);padding:20px;">Sin resultados.</div>'; return; }
  grid.innerHTML = items.map(v => buildItemCard(v)).join('');
  attachCardEvents(items);
}

function buildItemCard(item) {
  const imgUrl = imageData[item.id]?.url || '';
  const hasImg = !!imgUrl;
  const savedNotes = notesData[item.id] || '';
  const epTags = EPISODES.map(ep =>
    `<span class="ep-tag ${item.episodes.includes(ep) ? 'present' : ''}">${EP_LABELS[ep]}</span>`
  ).join('');
  const badgeClass = `badge-${item.badge}`;
  const badgeLabel = item.badge === 'villain' ? 'Villain' :
                     item.badge === 'vehicle' ? 'Vehicle' : 'Character';

  return `
  <div class="item-card" id="card-${item.id}">
    <div class="card-header">
      <div>
        <div class="card-name">${item.name}</div>
        <div class="card-role">${item.role || item.sku || ''}</div>
        ${item.vehicle ? `<div class="card-vehicle" onclick="goToVehicle('${item.id}')">${item.vehicle}</div>` : ''}
      </div>
      <span class="card-badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="carousel-wrap" id="carousel-wrap-${item.id}"
      ondragover="event.preventDefault(); this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="this.classList.remove('drag-over'); handleDrop(event, '${item.id}')"
    >${buildCarousel(item.id)}</div>
    <div class="upload-status" id="status-${item.id}"></div>
    <input type="file" id="file-${item.id}" accept="image/*" multiple onchange="handleFile(event, '${item.id}')">

        onblur="saveNotes('${item.id}')">${savedNotes}</textarea>
    </div>
  </div>`;
}

  // Events are handled via onclick attributes inline
}

// ════════════════════════════════════════
// RENDER ENVIRONMENTS

// ════════════════════════════════════════
// MULTI-IMAGE CAROUSEL SYSTEM
// ════════════════════════════════════════

// imageData[id] = { images: [{url, cloudinaryUrl}, ...] }
function getImages(id) {
  return imageData[id]?.images || [];
}

function buildCarousel(id) {
  const imgs = getImages(id);
  if(imgs.length === 0) {
    return `<div class="carousel-empty" 
      onclick="triggerFile('${id}')"
      ondragover="event.preventDefault(); this.style.borderColor='var(--pink)'"
      ondragleave="this.style.borderColor=''"
      ondrop="handleDrop(event, '${id}')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 16l5-5 4 4 4-5 5 6"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
      </svg>
      <span>Drop imágenes o click</span>
    </div>`;
  }
  const thumbs = imgs.map((img, i) => `
    <div class="carousel-thumb" onclick="openLightbox('${id}', ${i})">
      <img src="${img.cloudinaryUrl || img.url}" alt="">
      <button class="thumb-del" onclick="event.stopPropagation(); deleteImage('${id}', ${i})">×</button>
    </div>`).join('');
  return `
    <button class="carousel-btn prev hidden" id="prev-${id}" onclick="slideCarousel('${id}', -1)">‹</button>
    <div class="carousel-track-outer" id="track-outer-${id}">
      <div class="carousel-track" id="track-${id}">
        ${thumbs}
        <div class="carousel-add" onclick="triggerFile('${id}')">+</div>
      </div>
    </div>
    <button class="carousel-btn next hidden" id="next-${id}" onclick="slideCarousel('${id}', 1)">›</button>`;
}

function refreshCarousel(id) {
  const wrap = document.getElementById('carousel-wrap-'+id);
  if(wrap) wrap.innerHTML = buildCarousel(id);
  updateCarouselBtns(id);
}

function updateCarouselBtns(id) {
  const outer = document.getElementById('track-outer-'+id);
  const track = document.getElementById('track-'+id);
  const prev = document.getElementById('prev-'+id);
  const next = document.getElementById('next-'+id);
  if(!outer || !track || !prev || !next) return;
  const scrollable = track.scrollWidth > outer.clientWidth + 4;
  prev.classList.toggle('hidden', !scrollable);
  next.classList.toggle('hidden', !scrollable);
}

const carouselPos = {};
function slideCarousel(id, dir) {
  const outer = document.getElementById('track-outer-'+id);
  if(!outer) return;
  const step = 176;
  outer.scrollBy({ left: dir * step, behavior: 'smooth' });
}

function triggerFile(id) {
  document.getElementById('file-'+id)?.click();
}

function handleDrop(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if(!files.length) { showToast('Solo imágenes permitidas.'); return; }
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      if(!imageData[id]) imageData[id] = { images: [] };
      if(!imageData[id].images) imageData[id].images = [];
      const idx = imageData[id].images.length;
      imageData[id].images.push({ url: ev.target.result, cloudinaryUrl: '' });
      saveLocal();
      refreshCarousel(id);
      showToast('Subiendo a Cloudinary...');
      uploadCloudinaryFile(id, file, idx);
    };
    reader.readAsDataURL(file);
  });
}

function handleFile(event, id) {
  const files = Array.from(event.target.files);
  if(!files.length) return;
  files.forEach(file => {
    if(!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      if(!imageData[id]) imageData[id] = { images: [] };
      if(!imageData[id].images) imageData[id].images = [];
      const idx = imageData[id].images.length;
      imageData[id].images.push({ url: e.target.result, cloudinaryUrl: '' });
      saveLocal();
      refreshCarousel(id);
      showToast('Subiendo a Cloudinary...');
      uploadCloudinaryFile(id, file, idx);
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function deleteImage(id, idx) {
  if(!imageData[id]?.images) return;
  imageData[id].images.splice(idx, 1);
  saveLocal();
  saveJSONBin();
  refreshCarousel(id);
  updateStats();
}

// ════════════════════════════════════════
// NOTES
// ════════════════════════════════════════
function saveNotes(id) {
  const el = document.getElementById('notes-'+id);
  if(!el) return;
  notesData[id] = el.value;
  saveLocal();
  saveJSONBin();
  showToast('Nota guardada.');
}

// ════════════════════════════════════════
// CLOUDINARY UPLOAD
// ════════════════════════════════════════
async function uploadCloudinaryFile(id, file, idx) {
  setStatus(id, 'Subiendo...', '');
  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', pipeline.preset);
    fd.append('folder', 'convoy_breakdown');
    fd.append('public_id', 'convoy_' + id + '_' + idx + '_' + Date.now());
    const res = await fetch('https://api.cloudinary.com/v1_1/' + pipeline.cloudName + '/image/upload', {
      method:'POST', body:fd
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(imageData[id]?.images?.[idx]) {
      imageData[id].images[idx].cloudinaryUrl = data.secure_url;
      imageData[id].images[idx].url = data.secure_url;
    }
    saveLocal();
    setStatus(id, '✓ Cloudinary', 'ok');
    refreshCarousel(id);
    saveJSONBin();
    showToast('✓ Subido: ' + id);
  } catch(err) {
    setStatus(id, '✗ Error: '+err.message, 'err');
    showToast('Error: '+err.message);
  }
}

async function uploadCloudinary(id) {
  if(!pipeline.cloudName || !pipeline.preset) {
    showToast('Configurá Cloudinary en Pipeline primero.');
    return;
  }
  if(!imageData[id]?.url) {
    showToast('No hay imagen para subir.');
    return;
  }
  setStatus(id, 'Subiendo...', '');
  try {
    const blob = await (await fetch(imageData[id].url)).blob();
    const fd = new FormData();
    fd.append('file', blob);
    fd.append('upload_preset', pipeline.preset);
    fd.append('folder', 'convoy_breakdown');
    fd.append('public_id', `convoy_${id}`);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${pipeline.cloudName}/image/upload`, {
      method:'POST', body:fd
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    imageData[id].cloudinaryUrl = data.secure_url;
    saveLocal();
    setStatus(id, '✓ Cloudinary: '+data.secure_url.slice(0,40)+'...', 'ok');
    saveJSONBin();
    showToast(`✓ Subido a Cloudinary: ${id}`);
  } catch(err) {
    setStatus(id, '✗ Error: '+err.message, 'err');
    showToast('Error Cloudinary: '+err.message);
  }
}

function setStatus(id, msg, type) {
  const el = document.getElementById('status-'+id);
  if(!el) return;
  el.textContent = msg;
  el.className = 'upload-status '+(type||'');
}

// ════════════════════════════════════════
// JSONBIN SYNC
// ════════════════════════════════════════
async function saveJSONBin() {
  if(!pipeline.binId || !pipeline.binKey) return;
  try {
    // Only store cloudinary URLs (never base64) and notes — keeps payload tiny
    const images = {};
    Object.entries(imageData).forEach(([k,v]) => {
      if(v.images?.length) images[k] = v.images.map(i => i.cloudinaryUrl).filter(Boolean);
    });
    const payload = {
      project:'CONVOY',
      timestamp: new Date().toISOString(),
      images,
      notes: notesData
    };
    await fetch('https://api.jsonbin.io/v3/b/' + pipeline.binId, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': pipeline.binKey },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('JSONBin sync failed', e); }
}

// ════════════════════════════════════════
// PIPELINE MODAL
// ════════════════════════════════════════
function loadPipelineConfig() {
  try {
    const p = localStorage.getItem('convoy_pipeline');
    if(p) pipeline = JSON.parse(p);
  } catch(e){}
}
function openPipeline() {
  document.getElementById('cf-cloud').value = pipeline.cloudName||'';
  document.getElementById('cf-preset').value = pipeline.preset||'';
  document.getElementById('jb-bin').value = pipeline.binId||'';
  document.getElementById('jb-key').value = pipeline.binKey||'';
  updatePipeStatus();
  document.getElementById('pipeline-modal').classList.add('open');
}
function closePipeline() {
  document.getElementById('pipeline-modal').classList.remove('open');
}
function savePipeline() {
  pipeline.cloudName = document.getElementById('cf-cloud').value.trim();
  pipeline.preset = document.getElementById('cf-preset').value.trim();
  pipeline.binId = document.getElementById('jb-bin').value.trim();
  pipeline.binKey = document.getElementById('jb-key').value.trim();
  localStorage.setItem('convoy_pipeline', JSON.stringify(pipeline));
  updatePipeStatus();
  showToast('Pipeline guardado.');
  setTimeout(()=>{ closePipeline(); renderActive(); }, 800);
}
function updatePipeStatus() {
  const cfOk = pipeline.cloudName && pipeline.preset;
  const jbOk = pipeline.binId && pipeline.binKey;
  document.getElementById('pipe-dot-cf').className = 'pipe-dot '+(cfOk?'ok':'err');
  document.getElementById('pipe-text-cf').textContent = cfOk
    ? `Cloudinary: ${pipeline.cloudName} / ${pipeline.preset}`
    : 'Cloudinary: no configurado';
  document.getElementById('pipe-dot-jb').className = 'pipe-dot '+(jbOk?'ok':'err');
  document.getElementById('pipe-text-jb').textContent = jbOk
    ? `JSONBin: ${pipeline.binId.slice(0,12)}...`
    : 'JSONBin: no configurado';
}

// ════════════════════════════════════════
// JSONBIN LOAD
// ════════════════════════════════════════
async function loadJSONBin() {
  if(!pipeline.binId || !pipeline.binKey) return;
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b/' + pipeline.binId + '/latest', {
      method: 'GET',
      headers:{
        'X-Master-Key': pipeline.binKey,
        'X-Bin-Meta': 'false'
      }
    });
    if(!res.ok) {
      console.warn('JSONBin load HTTP error:', res.status);
      return;
    }
    const data = await res.json();
    const record = data.record || data;
    if(!record) return;
    // Merge notes — remote wins
    if(record.notes) {
      Object.entries(record.notes).forEach(([k,v]) => {
        if(v) notesData[k] = v;
      });
    }
    // Merge cloudinary URLs
    if(record.images) {
      Object.entries(record.images).forEach(([k,v]) => {
        const urls = Array.isArray(v) ? v : (typeof v === 'string' ? [v] : []);
        if(urls.length) {
          if(!imageData[k]) imageData[k] = { images: [] };
          if(!imageData[k].images) imageData[k].images = [];
          urls.forEach(url => {
            if(url && !imageData[k].images.find(i => i.cloudinaryUrl === url)) {
              imageData[k].images.push({ cloudinaryUrl: url, url });
            }
          });
        }
      });
    }
    saveLocal();
    renderActive();
    updateStats();
    console.log('JSONBin loaded OK');
  } catch(e) {
    console.warn('JSONBin load failed:', e);
  }
}

// ════════════════════════════════════════
// EXPORT ZIP
// ════════════════════════════════════════
function exportZip() {
  const allItems = [...CHARACTERS, ...VEHICLES, ...ENVIRONMENTS];
  const rows = ['ID,NAME,TYPE,EPISODES,SKU,HAS_IMAGE,CLOUDINARY_URL,NOTES'];
  allItems.forEach(item => {
    const img = imageData[item.id];
    rows.push([
      item.id,
      `"${item.name}"`,
      item.badge,
      `"${item.episodes.join('|')}"`,
      item.sku||'',
      img?.url ? '1' : '0',
      `"${img?.cloudinaryUrl||''}"`,
      `"${(notesData[item.id]||'').replace(/"/g,'""')}"`
    ].join(','));
  });
  const csv = rows.join('\n');

  const manifest = {
    project: 'CONVOY — Matchbox Adventure Squad S01',
    exportDate: new Date().toISOString(),
    totalItems: allItems.length,
    imagesUploaded: allItems.filter(i => imageData[i.id]?.cloudinaryUrl).length,
    pipeline: { cloudName: pipeline.cloudName||'not set', binId: pipeline.binId||'not set' },
    breakdown: {
      characters: CHARACTERS.map(c => ({ id:c.id, name:c.name, role:c.role, episodes:c.episodes, notes:notesData[c.id]||'', image:imageData[c.id]?.cloudinaryUrl||'' })),
      vehicles: VEHICLES.map(v => ({ id:v.id, name:v.name, sku:v.sku, episodes:v.episodes, notes:notesData[v.id]||'', image:imageData[v.id]?.cloudinaryUrl||'' })),
      environments: ENVIRONMENTS.map(e => ({ id:e.id, name:e.name, episodes:e.episodes, notes:notesData[e.id]||'', image:imageData[e.id]?.cloudinaryUrl||'' }))
    }
  };

  // Create manifest JSON blob
  const jsonBlob = new Blob([JSON.stringify(manifest, null, 2)], {type:'application/json'});
  const csvBlob = new Blob([csv], {type:'text/csv'});

  // Download both
  dlBlob(jsonBlob, 'convoy_breakdown_manifest.json');
  setTimeout(()=> dlBlob(csvBlob, 'convoy_breakdown_assets.csv'), 200);
  showToast('Exportado: manifest.json + assets.csv');
}

function dlBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function goToVehicle(charId) {
  const ids = VEHICLE_LINKS[charId];

// ════════════════════════════════════════
// LIGHTBOX
// ════════════════════════════════════════
let lbId = null, lbIdx = 0;
function openLightbox(id, idx) {
  lbId = id; lbIdx = idx;
  const imgs = getImages(id);
  document.getElementById('lightbox-img').src = imgs[idx]?.cloudinaryUrl || imgs[idx]?.url || '';
  document.getElementById('lightbox-counter').textContent = (idx+1) + ' / ' + imgs.length;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function lbNav(dir) {
  const imgs = getImages(lbId);
  lbIdx = (lbIdx + dir + imgs.length) % imgs.length;
  document.getElementById('lightbox-img').src = imgs[lbIdx]?.cloudinaryUrl || imgs[lbIdx]?.url || '';
  document.getElementById('lightbox-counter').textContent = (lbIdx+1) + ' / ' + imgs.length;
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft') lbNav(-1);
  if(e.key === 'ArrowRight') lbNav(1);
});

// ════════════════════════════════════════
// RESET ALL
// ════════════════════════════════════════
function resetAll() {
  if(!confirm('¿Borrar todas las imágenes y notas guardadas localmente? Esta acción no se puede deshacer.')) return;
  localStorage.removeItem('convoy_images');
  localStorage.removeItem('convoy_notes');
  imageData = {};
  notesData = {};
  carouselPos && Object.keys(carouselPos).forEach(k => delete carouselPos[k]);
  renderActive();
  updateStats();
  showToast('Todo limpiado. Podés empezar de cero.');
}

// Close modal on outside click
document.getElementById('pipeline-modal').addEventListener('click', function(e) {
  if(e.target === this) closePipeline();
});
